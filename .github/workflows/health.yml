name: Health

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install project and dev dependencies
        run: uv sync --all-groups

      - name: Ruff
        run: uv run ruff check app_core scripts tests main.py SyncEngine/contracts.py SyncEngine/quick_writes.py

      - name: Mypy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest

      - name: Architecture checks
        run: uv run python scripts/check_architecture.py

      - name: Packaging smoke test
        run: uv build
